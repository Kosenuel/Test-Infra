server:
  ingress:
    enabled: true
    ingressClassName: nginx
    controller: generic

    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    hostname: argocd-protocoast.vm.fedcloud.eu
    path: /
    pathType: Prefix

    tls: true   # <-- IMPORTANT (boolean, not secretName)

configs:
  params:
    server.insecure: "true"
  cm:
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"
  
repoServer:
  initContainers:
    - name: install-ksops
      image: alpine:3.20
      command:
        - /bin/sh
        - -ec
      args:
        - |
          apk add --no-cache curl tar
          mkdir -p /custom-tools/kustomize/plugin/viaduct.ai/v1/ksops
          curl -fsSL https://github.com/viaduct-ai/kustomize-sops/releases/download/v4.4.0/ksops_4.4.0_Linux_x86_64.tar.gz -o /tmp/ksops.tgz
          tar -xzf /tmp/ksops.tgz -C /tmp
          install -m 0755 /tmp/ksops /custom-tools/kustomize/plugin/viaduct.ai/v1/ksops/ksops
          mkdir -p /custom-tools/kustomize
          curl -fsSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz -o /tmp/kustomize.tgz
          tar -xzf /tmp/kustomize.tgz -C /tmp
          install -m 0755 /tmp/kustomize /custom-tools/kustomize/kustomize
          chmod +x /custom-tools/kustomize/plugin/viaduct.ai/v1/ksops/ksops
          chmod +x /custom-tools/kustomize/kustomize
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools

  env:
    - name: KUSTOMIZE_PLUGIN_HOME
      value: /custom-tools/kustomize/plugin
    - name: XDG_CONFIG_HOME
      value: /custom-tools
    - name: SOPS_AGE_KEY_FILE
      value: /custom-tools/sops/age/keys.txt

  volumeMounts:
    - name: custom-tools
      mountPath: /custom-tools
    - name: age-key
      mountPath: /custom-tools/sops/age/keys.txt
      subPath: keys.txt

  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: age-key
      secret:
        secretName: argocd-sops-age
        items:
          - key: keys.txt
            path: keys.txt
    


  
