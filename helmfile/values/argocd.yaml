server:
  ingress:
    enabled: true
    ingressClassName: nginx
    controller: generic

    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    hostname: argocd-protocoast.vm.fedcloud.eu
    path: /
    pathType: Prefix

    tls: true   # <-- IMPORTANT (boolean, not secretName)

configs:
  params:
    server.insecure: "true"
  cm:
    kustomize.buildOptions: "--enable-alpha-plugins --enable-exec"
  
repoServer:
  initContainers:
    - name: install-ksops
      image: viaductoss/ksops:v4.4.0
      command:
        - /bin/sh
        - -ec
      args:
        - |
          mkdir -p /custom-tools/kustomize/plugin/viaduct.ai/v1/ksops
          cp /usr/local/bin/ksops /custom-tools/kustomize/plugin/viaduct.ai/v1/ksops/ksops
          cp /usr/local/bin/kustomize /custom-tools/kustomize/kustomize || true
          chmod +x /custom-tools/kustomize/plugin/viaduct.ai/v1/ksops/ksops
          chmod +x /custom-tools/kustomize/kustomize || true
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools

  env:
    - name: KUSTOMIZE_PLUGIN_HOME
      value: /custom-tools/kustomize/plugin
    - name: XDG_CONFIG_HOME
      value: /custom-tools

  volumeMounts:
    - name: custom-tools
      mountPath: /custom-tools
    - name: age-key
      mountPath: /custom-tools/.config/sops/age/keys.txt
      subPath: keys.txt

  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: age-key
      secret:
        secretName: argocd-sops-age
        items:
          - key: keys.txt
            path: keys.txt
    


  
