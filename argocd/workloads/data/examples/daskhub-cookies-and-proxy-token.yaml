apiVersion: v1
kind: Secret
metadata:
  name: daskhub-cookies-and-proxy-token
  namespace: daskhub
type: Opaque
stringData:
  values.yaml: |
    proxy:
      secretToken: "replace-with-randomly-generated-64-hex-chars"
    hub:
      cookieSecret: "replace-with-randomly-generated-64-hex-chars"
      config:
        CryptKeeper:
          keys:
            - "replace-with-randomly-generated-64-hex-chars"
      services:
        cull:
          apiToken: "replace-with-randomly-generated-64-hex-chars"
# randomly generated 64 hex chars can be created by running the following command in a terminal:
# openssl rand -hex 32
