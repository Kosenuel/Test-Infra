apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-ingress-nginx-main
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: main
            server: https://10.0.1.32:6443
  template:
    metadata:
      name: 'platform-ingress-nginx-{{cluster}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io/background
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: platform
      sources:
        - repoURL: https://kubernetes.github.io/ingress-nginx
          chart: ingress-nginx
          targetRevision: 4.11.3
          helm:
            releaseName: ingress-nginx
            valueFiles:
              - $values/argocd/workloads/platform/ingress-nginx/nginx-values.yaml
        - repoURL: https://github.com/Kosenuel/Test-Infra
          targetRevision: feature/live-env
          ref: values
      destination:
        server: '{{server}}'
        namespace: ingress-nginx
      revisionHistoryLimit: 5
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 5
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 5m
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - PruneLast=true
          - PrunePropagationPolicy=background
          - ServerSideApply=true
